name: Publish to NPM

on:
  push:
    branches:
      - main
  workflow_dispatch: {}

# Prevent overlapping publishes from racing on the same tag/version.
concurrency:
  group: publish-main
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Decide whether to publish
        id: decide
        run: |
          set -euo pipefail
          PKG_NAME="$(node -p "require('./package.json').name")"
          PKG_VERSION="$(node -p "require('./package.json').version")"

          # Latest version currently published to npm (0.0.0 if never published).
          NPM_VERSION="$(npm view "$PKG_NAME" version 2>/dev/null || echo '0.0.0')"

          echo "package.json version: $PKG_VERSION"
          echo "npm latest version:   $NPM_VERSION"

          # Highest of the two according to semver ordering.
          HIGHEST="$(printf '%s\n%s\n' "$NPM_VERSION" "$PKG_VERSION" | sort -V | tail -n1)"

          if [ "$PKG_VERSION" != "$NPM_VERSION" ] && [ "$HIGHEST" = "$PKG_VERSION" ]; then
            echo "package.json is ahead of npm — will publish v$PKG_VERSION."
            echo "publish=true" >> "$GITHUB_OUTPUT"
            echo "version=$PKG_VERSION" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::package.json ($PKG_VERSION) is not ahead of npm ($NPM_VERSION) — nothing to publish. Bump the version in package.json to cut a release."
            echo "publish=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Abort if tag already exists
        if: steps.decide.outputs.publish == 'true'
        run: |
          set -euo pipefail
          if git rev-parse "v${{ steps.decide.outputs.version }}" >/dev/null 2>&1; then
            echo "::error::Tag v${{ steps.decide.outputs.version }} already exists. Bump package.json to a new version."
            exit 1
          fi

      - name: Extract release notes
        if: steps.decide.outputs.publish == 'true'
        run: |
          set -euo pipefail
          bash scripts/extract-release-notes.sh "${{ steps.decide.outputs.version }}" > RELEASE_NOTES.md
          if [ ! -s RELEASE_NOTES.md ]; then
            echo "::error::No release notes found for v${{ steps.decide.outputs.version }} in CHANGELOG.md. The version-check gate should have caught this on the PR."
            exit 1
          fi
          echo "Release notes for v${{ steps.decide.outputs.version }}:"
          cat RELEASE_NOTES.md

      - name: Setup Node.js
        if: steps.decide.outputs.publish == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Setup pnpm
        if: steps.decide.outputs.publish == 'true'
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        if: steps.decide.outputs.publish == 'true'
        run: pnpm install --frozen-lockfile

      - name: Run tests
        if: steps.decide.outputs.publish == 'true'
        run: pnpm test

      - name: Run build
        if: steps.decide.outputs.publish == 'true'
        run: pnpm build

      - name: Create and push git tag
        if: steps.decide.outputs.publish == 'true'
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v${{ steps.decide.outputs.version }}" -F RELEASE_NOTES.md
          git push origin "v${{ steps.decide.outputs.version }}"

      - name: Publish to NPM
        if: steps.decide.outputs.publish == 'true'
        run: pnpm publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        if: steps.decide.outputs.publish == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ steps.decide.outputs.version }}" \
            --title "v${{ steps.decide.outputs.version }}" \
            --notes-file RELEASE_NOTES.md
